Base:
    model_root: './checkpoints/'
    num_workers: 2
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: user_index
    use_features: null
    feature_specs: null
    feature_config: null

DIN_QK_Video_Action: # This is a config template
    model: DIN
    dataset_id: QK_Video_Action
    loss: ['binary_crossentropy', 'binary_crossentropy', 'binary_crossentropy', 'binary_crossentropy']
    metrics: ['logloss', 'AUC', 'gAUC']
    task: binary_classification
    optimizer: adam
    learning_rate: 1.0e-3
    embedding_regularizer: 0
    net_regularizer: 0
    batch_size: 8192
    embedding_dim: 16
    dnn_hidden_units: [400, 400, 400]
    tower_hidden_units: [128, 64]
    num_tasks: 4
    dnn_activations: ReLU
    tower_activations: ReLU
    attention_hidden_units: [256, 128]
    attention_hidden_activations: "Dice"
    attention_output_activation: null
    attention_dropout: 0
    din_use_softmax: True
    net_dropout: 0
    batch_norm: False
    epochs: 1
    shuffle: True
    seed: 20262027
    monitor: {'AUC': 1, 'logloss': 0, 'gAUC': 1}
    monitor_mode: 'max'
    max_len: 100
    accumulation_steps: 1

